name: Weekly Game Results Refresh + Retrain

on:
  schedule:
    - cron: '0 15 * * 1'   # Mondays at 3 PM UTC = 8 AM PT (after daily run)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas numpy xgboost scikit-learn requests mlb-statsapi pybaseball

      - name: Refresh current season game results
        run: |
          python data/fetch_games_update.py

      - name: Rebuild training features
        run: |
          python data/build_features.py

      - name: Retrain model
        run: |
          python data/train_model.py

      - name: Run backtest
        run: |
          python data/backtest.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/game_results.csv raw/model.json || true
          git add raw/backtest_results.csv raw/backtest_report.html raw/feature_importance.csv || true
          git diff --staged --quiet || git commit -m "Weekly refresh + retrain $(date +'%Y-%m-%d')"
          git push